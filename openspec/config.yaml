schema: spec-driven

context: |
  Tech stack: Angular 21 + TypeScript 5.9 + TailwindCSS 4 + Vite
  Architecture: Standalone components, signals, OnPush, lazy loading
  Testing: Vitest + @testing-library/angular + jsdom
  Style: Prettier (printWidth 100, singleQuote), strict TypeScript

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: true
  runner:
    command: ng test
    framework: Vitest
  layers:
    unit:
      available: true
      tool: "@testing-library/angular + jsdom"
    integration:
      available: true
      tool: "@testing-library/angular + jsdom"
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: "tsc --noEmit"
    formatter:
      available: true
      command: prettier
